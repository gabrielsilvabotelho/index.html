<!DOCTYPE html>
<html>
<head>
  <title>GSBTrader PRO</title>
  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .card {
      background: #1e293b;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
    }
    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>📊 GSBTrader PRO</h1>

<div class="card">
  <h3>Login</h3>
  <input id="user" placeholder="Usuário"><br><br>
  <input id="pass" type="password" placeholder="Senha"><br><br>
  <button onclick="login()">Entrar</button>
</div>

<div id="app" style="display:none;"><div class="card"><div class="card">
  <h3>Gráfico ao vivo</h3>

  <select id="par" onchange="trocarPar()">
    <option value="FX:EURUSD">EUR/USD</option>
    <option value="FX:GBPUSD">GBP/USD</option>
    <option value="FX:USDJPY">USD/JPY</option>
    <option value="FX:AUDCAD">AUD/CAD</option>
  </select>

  <br><br>

  <div id="tradingview_chart"></div>
</div>
  <h3>Gráfico ao vivo</h3>
  <div id="tradingview_chart"></div>
</div>
  <div class="card">
    <h3>Sinais em tempo real</h3>
    <ul id="sinais"></ul>
  </div>
</div>

<script>
let token = "";

function login(){
  fetch("https://gsbtrader-backend.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.token){
      token = data.token;
      document.getElementById("app").style.display = "block";
      carregar();
    } else {
      alert("Login inválido");
    }
  })
  .catch(() => alert("Erro ao conectar com servidor"));
}

function carregar(){
  fetch("https://gsbtrader-backend.onrender.com/sinais")
  .then(res => res.json())
  .then(data => {
    const lista = document.getElementById("sinais");
    lista.innerHTML = "";

    data.forEach(s => {
      const li = document.createElement("li");
      li.innerText = s.par + " - " + s.sinal;
      lista.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById("sinais").innerHTML = "<li>Erro ao carregar sinais</li>";
  });
}
</script>

</body><script src="https://s3.tradingview.com/tv.js"></script>

<script src="https://s3.tradingview.com/tv.js"></script>

<script>
let widget;

function carregarGrafico(simbolo){
  document.getElementById("tradingview_chart").innerHTML = "";

  widget = new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": simbolo,
    "interval": "1",
    "timezone": "America/Sao_Paulo",
    "theme": "dark",
    "style": "1",
    "locale": "br",
    "container_id": "tradingview_chart"
  });
}

function trocarPar(){
  const par = document.getElementById("par").value;
  carregarGrafico(par);
}

// carregar inicial
window.onload = () => {
  carregarGrafico("FX:EURUSD");
};
</script>
