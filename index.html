<script>
let token = "";

function login(){
  fetch("https://gsbtrader-backend.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.token){
      token = data.token;
      document.getElementById("app").style.display = "block";
      carregar();
    } else {
      alert("Login inválido");
    }
  })
  .catch(() => alert("Erro ao conectar com servidor"));
}

function carregar(){
  fetch("https://gsbtrader-backend.onrender.com/sinais", {
    headers: { "Authorization": token }
  })
  .then(res => res.json())
  .then(data => {
    const lista = document.getElementById("sinais");
    lista.innerHTML = "";

    if(!data || data.length === 0){
      lista.innerHTML = "<li>Nenhum sinal encontrado</li>";
      return;
    }

    data.forEach(s => {
      const li = document.createElement("li");
      li.innerText = s.par + " - " + s.sinal;
      lista.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById("sinais").innerHTML = "<li>Erro ao carregar sinais</li>";
  });
}
</script>
