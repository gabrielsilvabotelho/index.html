<script>
let token = "";

function login(){
  fetch("https://gsbtrader-backend.onrender.com/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      username: document.getElementById("user").value,
      password: document.getElementById("pass").value
    })
  })
  .then(res => res.json())
  .then(data => {
    if(data.token){
      token = data.token;
      document.getElementById("app").style.display = "block";
      carregar();
    } else {
      alert("Login inválido");
    }
  })
  .catch(() => alert("Erro ao conectar com servidor"));
}

function carregar(){
  fetch("https://gsbtrader-backend.onrender.com/sinais")
  .then(res => res.json())
  .then(data => {
    const lista = document.getElementById("sinais");
    lista.innerHTML = "";

    data.forEach(s => {
      const li = document.createElement("li");
      li.innerText = s.par + " - " + s.sinal;
      lista.appendChild(li);
    });
  })
  .catch(() => {
    document.getElementById("sinais").innerHTML = "<li>Erro ao carregar sinais</li>";
  });
}
</script>

<script>
let widget;

function carregarGrafico(simbolo){
  document.getElementById("tradingview_chart").innerHTML = "";

  widget = new TradingView.widget({
    "width": "100%",
    "height": 400,
    "symbol": simbolo,
    "interval": "1",
    "timezone": "America/Sao_Paulo",
    "theme": "dark",
    "style": "1",
    "locale": "br",
    "container_id": "tradingview_chart"
  });
}

function trocarPar(){
  const par = document.getElementById("par").value;
  carregarGrafico(par);
}

// carregar inicial
window.onload = () => {
  carregarGrafico("FX:EURUSD");
};
</script>
